<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article — SecureSovereign</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="/article.css" rel="stylesheet">
</head>
<body>
    <nav class="site-nav">
        <a href="/">← Home</a>
        <span class="sep">/</span>
        <span id="nav-title" style="color: var(--text-muted); font-family: 'Courier New', monospace; font-size: 0.9rem;">Article</span>
    </nav>

    <div class="article-wrap">
        <p id="status" class="mb-3">Redirecting…</p>
    </div>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const doc = params.get('doc');
            const statusEl = document.getElementById('status');
            const navTitleEl = document.getElementById('nav-title');

            function fail(msg) {
                statusEl.textContent = msg;
                statusEl.classList.add('error');
            }

            function fileToSlug(file) {
                var base = file.replace(/\.md$/, '');
                if (base === 'index') return null;
                return base.replace(/_/g, '-');
            }

            if (!doc || !/^[a-zA-Z0-9][a-zA-Z0-9._/-]*\.md$/.test(doc)) {
                fail('Missing or invalid article. Open an article from the home page.');
                return;
            }

            fetch('articles.json', { cache: 'no-store' })
                .then(function (r) {
                    if (!r.ok) throw new Error('Could not load article list.');
                    return r.json();
                })
                .then(function (manifest) {
                    var list = manifest.articles || [];
                    var slugFromDoc = fileToSlug(doc.split('/').pop());
                    var entry = list.find(function (a) {
                        return a.file === doc || (slugFromDoc && a.slug === slugFromDoc);
                    });
                    if (!entry) {
                        throw new Error('Unknown article.');
                    }
                    var slug = entry.slug || fileToSlug(entry.file);
                    if (entry.title) {
                        document.title = entry.title + ' — SecureSovereign';
                        navTitleEl.textContent = entry.title;
                    }
                    var target = '/articles/' + slug + '/' + (window.location.hash || '');
                    window.location.replace(target);
                })
                .catch(function (e) {
                    fail(e.message || 'Something went wrong.');
                });
        })();
    </script>
</body>
</html>
